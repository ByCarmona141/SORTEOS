services:
  app:
    build:
        context: .
        dockerfile: docker/php/Dockerfile
    container_name: sorteos_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - sorteos_net

  db:
    image: mariadb:11
    container_name: sorteos_db
    restart: always
    environment:
        MARIADB_ROOT_PASSWORD: root
        MARIADB_DATABASE: sorteos
        MARIADB_USER: user
        MARIADB_PASSWORD: secret
    ports:
        - "3307:3306"
    volumes:
        - db_data:/var/lib/mysql
    networks:
        - sorteos_net

  phpmyadmin:
    image: phpmyadmin
    container_name: sorteos_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
    networks:
      - sorteos_net

volumes:
  db_data:

networks:
  sorteos_net:
